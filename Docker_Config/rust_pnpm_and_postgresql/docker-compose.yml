version: "3.9"
services:
  rust:
    build: 
      context: ./backend
      dockerfile: rust.dockerfile 
    container_name: rust-dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace
      
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/workspace/target
    tty: true
    stdin_open: true
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://rene:123456@db:5432/postgres

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=rene
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"

    volumes:
      - E:/docker_demo/rust_demo/postgres:/var/lib/postgresql/data

  web:
    build:
      context: ./frontend
      dockerfile: pnpm.dockerfile
    container_name: pnpm-web
   
    environment:
      - CHOKIDAR_USEPOLLING=true 
    ports:
      - "5173:5173"   
        
    volumes:
      - ./frontend:/app
       
    stdin_open: true
    tty: true
    depends_on:
      - rust            

volumes:
  cargo-registry: 
  target-cache: