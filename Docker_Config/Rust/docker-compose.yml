version: "3.9"
services:
  rust:
    build: .
    container_name: rust-dev
    volumes:
      - .:/workspace
      
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/workspace/target
    tty: true
    stdin_open: true
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://rene:123456@db:5432/postgres

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=rene
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"

    volumes:
      - E:/docker_demo/postgres:/var/lib/postgresql/data      

volumes:
  cargo-registry: 
  target-cache: